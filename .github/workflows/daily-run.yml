name: 시로 컴퍼니 데일리 자동 실행

on:
  schedule:
    # 매일 08:00 KST = 23:00 UTC (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 트리거

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  daily-task:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.13 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 의존성 설치
        run: pip install anthropic google-genai python-dotenv filelock pytest

      - name: 시로 컴퍼니 --auto 실행
        run: |
          cd shiro_company
          python run_task.py --auto
        timeout-minutes: 10

      - name: 산출물 커밋 + 푸시
        run: |
          git config user.name "Shiro Company Bot"
          git config user.email "shiro-bot@users.noreply.github.com"
          git add shiro_company/budget.json \
                  shiro_company/dashboard/ \
                  shiro_company/output/ \
                  shiro_company/logs/
          # 변경 사항이 있을 때만 커밋
          git diff --staged --quiet || \
            git commit -m "🤖 데일리 자동 실행 ($(date -u +%Y-%m-%d))"
          git push

  # GitHub Pages 배포 (dashboard/index.html)
  deploy-dashboard:
    needs: daily-task
    runs-on: ubuntu-latest
    if: always() && needs.daily-task.result == 'success'

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main  # 위에서 push한 최신 커밋

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./shiro_company/dashboard
          publish_branch: gh-pages
